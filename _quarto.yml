project:
  type: book
  output-dir: _book
  post-render:
    - cp -r logos _book/slides/logos

filters:
  - slides-margin.lua # for 'Open Slides' to appear below the TOC on the right

book:
  title: "R for Publication"
  subtitle: "Reporting, Tables, and Figures for Academic Manuscripts"
  author: "Daniela Palleschi"
  date: today
  margin-footer: margin-footer.html
  navbar:
    right:
      - icon: home
        href: https://daniela-palleschi.github.io/
        text: D. Palleschi
      - icon: github
        href: https://github.com/daniela-palleschi/publishr
        aria-label: Source Code
  sidebar:
    style: "docked"
    collapse-level: 1
    search: true
  twitter-card: true
  chapters:
    - index.qmd
    - part: "Session 1: Quarto foundations"
      chapters:
      - chapters/01_intro.qmd
      - chapters/02_writing.qmd
      - chapters/03_formats.qmd
      - chapters/04_data.qmd
    - part: "Session 2: Model Outputs & Reporting"
      # chapters:
      # - chapters/05_open-science.qmd
      # - chapters/06_tables.qmd
        # #- chapters/07_manuscripts.qmd
        # - chapters/08_exporting.qmd
    - part: "Exercises"
      chapters: 
      - exercises/setup.qmd
      - exercises/day1.qmd 
    - references.qmd

bibliography: references.bib
csl: apa.csl

crossref:
  exm-prefix: ex.

format:
  html:
    theme:
      light:
        - flatly
        - custom.scss
      dark:
        - darkly
        - custom.scss
    code-tools: true
    toc: true
    toc-depth: 3
    number-sections: true
    page-layout: full
    embed-resources: false
    fig-width: 7
    fig-height: 5
  pdf:
    pdf-engine: pdflatex # use pdflatex instead of lualatex to avoid lua-ul/luacolor dependency
    include-in-header:
      text: |
        \usepackage[utf8]{inputenc}  % Unicode character support for pdflatex
        \usepackage{pmboxdraw}       % box-drawing characters (├, └, ─) for file structure diagrams
        \usepackage{booktabs}        % professional table rules (required for kableExtra booktabs = TRUE)
        \usepackage{longtable}       % tables that span multiple pages
        \usepackage{microtype}       % improved text justification and spacing
    documentclass: scrbook # KOMA-Script book class: better typography than standard LaTeX book
    papersize: a4
    toc: true
    number-sections: true
    colorlinks: true
    fig-width: 6 # in inches
    fig-height: 4

execute:
  eval: true
  echo: true
  message: false
  error: false
  warning: false
  fig-align: center
  fig-asp: 0.618

editor: source

knitr:
  opts_chunk:
    comment: "#>"
    fig.align: "center"