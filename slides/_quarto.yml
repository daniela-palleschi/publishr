# slides/_quarto.yml
project:
  type: default
  output-dir: ../_book/slides

author: "Daniela Palleschi"
date: "2025-03-25"
date-format: "MMMM D, YYYY"
  
knitr:
  opts_knit:
    root.dir: ".." # so that 'here' will use project folder as root directory

format:
  revealjs:
    theme: [simple, zas-footer.scss]
    logo: logos/ZAS_Marke-Lang_weiss.svg
    footer: "R for Publication    -    {{< meta day >}}:    {{< meta title >}}"
    width: 1600
    height: 900
    slide-number: c/t
    slide-level: 4
    navigation-mode: linear
    controls-layout: bottom-right
    progress: true
    scrollable: false
    incremental: true
    center: false
    code-overflow: wrap
    code-link: true
    fig-align: center
    fig-cap-location: top
    fig-dpi: 300
    font-size: 0.6em
    toc: false
    toc-depth: 2
    toc-title: "Overview"
    link-external-newwindow: true
    sc-sb-title: true
    embed-resources: false
    simplemenu:
      barhtml:
        header: "<div class='menubar'></a><ul class='menu'></ul><div class='slide-number'></div><div>"
      scale: 0.5
revealjs-plugins:
  - simplemenu # https://github.com/Martinomagnifico/quarto-simplemenu
  # quarto add Martinomagnifico/quarto-simplemenu (make sure it's in the same folder as this .yml)